  connects_to: obj-003
  completed_date: '2026-03-10'
- id: obj-003
  status: completed
  statement: 'Optimized training loops: replaced DataLoader with direct index slicing, pre-compute fixed transforms in receiver
    pre-training'
  methodology: >
    Replaced torch.utils.data DataLoader/TensorDataset with direct torch.randperm
    index slicing for both training loops. In pretrain_receiver(), pre-computed
    ActionToSignal and Environment transforms once outside the epoch loop (since
    these are fixed random linear transforms with no learnable parameters), eliminating
    redundant forward passes every batch. Removed DataLoader dependency entirely.
  metrics:
    dataloader_removed: true
    dependencies_removed: 2
    receiver_forward_passes_reduced: 'E*B*3 → E*B*1'
    fixed_transform_calls: 'E*B*2 → 1'
  figures:
  - results/obj-003-training-loop-optimization.png
  conclusions: >
    Two key optimizations: (1) pre-computing fixed transforms in receiver pre-training
    reduces forward passes from 3 per batch (ActionToSignal + Environment + Receiver)
    to 1 (Receiver only), saving ~67% of forward-pass compute; (2) replacing DataLoader
    with index slicing removes shuffle/collate overhead and the torch.utils.data
    dependency. Both loops now use minimal pure-PyTorch operations.
  connects_to: obj-004
  completed_date: '2026-03-10'
- id: obj-004
  status: completed
  statement: Added parameter sweep script (sweep.py) with 4 experiment types
  methodology: >
    Created sweep.py with a reusable run_experiment() harness that instantiates
    the full pipeline, trains both phases, and evaluates on normal and uniform test
    distributions. Defined 4 experiments: (1) dimension scaling [8,16,32,64],
    (2) hidden dim scaling [64,128,256] at dim=32, (3) learning rate sweep
    [3e-4,1e-3,3e-3], (4) asymmetric/signal dim scaling. Uses fast defaults
    (500 recv, 800 emit epochs, 3k samples) for rapid iteration. Results saved
    to JSON for downstream analysis.
  metrics:
    experiment_types: 4
    total_configurations: 13
    metrics_per_run: 7
    output_format: JSON
  figures:
  - results/obj-004-parameter-sweep-script.png
  conclusions: >
    The sweep script enables systematic exploration of the hyperparameter space
    with minimal boilerplate. Each run captures receiver loss, emitter loss, test MSE
    on two distributions, parameter counts, and wall-clock time. Fast training defaults
    allow a full 13-configuration sweep in minutes, with findings validated later via
    main.py at full scale.
  connects_to: obj-005
  completed_date: '2026-03-10'
- id: obj-005
  status: completed
  statement: Discovered and documented sound_dim==action_dim constraint
  methodology: >
    During sweep.py Experiment 4 (asymmetric action dims), attempted configurations
    with sound_dim != action_dim (bottleneck 32→16→32, expansion 32→64→32). These
    crashed with shape mismatches, revealing that pretrain_receiver() uses an identity
    mapping (sound = action) which requires both dimensions to match. Root cause:
    sounds are sampled as randn(N, sound_dim) then passed directly to ActionToSignal
    which expects (N, action_dim) inputs. Documented the constraint in planning.md
    and redesigned Experiment 4 to vary signal_dim instead (channel bandwidth).
  metrics:
    configurations_that_crashed: 2
    root_cause: identity_mapping_in_pretrain_receiver
    sweep_experiment_redesigned: 'Exp 4: asymmetric action → signal_dim scaling'
  figures:
  - results/obj-005-sound-dim-action-dim-constraint.png
  conclusions: >
    The identity mapping assumption (sound IS the action during receiver pre-training)
    is a fundamental architectural constraint, not a bug. Supporting asymmetric
    sound_dim/action_dim would require a different pre-training strategy (e.g., a
    learned encoder instead of identity). This discovery led to obj-006 (assertion +
    test) and informed all subsequent experiment designs to keep sound_dim == action_dim.
  connects_to: obj-006
  completed_date: '2026-03-10'
- id: obj-006
  status: completed
  statement: Added assertion + test for the sound_dim==action_dim constraint
  methodology: >
    Added an assertion at the top of pretrain_receiver() in train.py (line 26) that
    raises AssertionError with a descriptive message when sound_dim != action_dim.
    Added a corresponding pytest guard (test_asymmetric_dims_rejected) that creates
    a Config with sound_dim=16, action_dim=8 and verifies the assertion fires before
    any training occurs. This prevents silent shape mismatches or wrong gradients
    from the identity mapping assumption.
  metrics:
    assertion_location: 'train.py:26'
    test_location: 'test_vaural.py:148'
    total_tests_after: 28
    failure_mode_prevented: shape_mismatch_or_silent_wrong_gradients
  figures:
  - results/obj-006-added-assertion---test-for-the-constrain.png
  conclusions: >
    The assertion catches misconfigurations at the earliest possible point (start of
    receiver pre-training) with a clear error message. The pytest guard ensures this
    check is never accidentally removed during refactoring. Together they codify the
    architectural constraint discovered in obj-005 into enforceable code.
  connects_to: obj-007
  completed_date: '2026-03-10'
