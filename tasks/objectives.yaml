objectives:
- id: obj-001
  status: completed
  statement: 'Initial project scaffolding verified: all 27 tests pass'
  methodology: >
    Built full test suite covering 7 categories: shape validation (6 tests),
    fixed-component determinism and buffer properties (6 tests), pipeline trace
    correctness (2 tests), edge-case NaN safety (2 tests), receiver pre-training
    convergence (3 tests), emitter training with frozen receiver (6 tests), and
    end-to-end round-trip reconstruction (2 tests). Ran pytest to confirm all pass.
  metrics:
    tests_total: 27
    test_categories: 7
    runtime_seconds: 88
    all_passing: true
  figures:
  - results/obj-001-initial-project-scaffolding-verified--al.png
  conclusions: >
    All 27 tests pass across shapes, determinism, training convergence, gradient
    isolation, and end-to-end reconstruction. The scaffolding validates that the
    two-phase training pipeline (pre-train Receiver, then train Emitter with frozen
    Receiver) works correctly and that fixed components are truly parameter-free.
  connects_to: obj-002
  completed_date: '2026-03-10'
- id: obj-002
  status: completed
  statement: Git repo initialized with .gitignore
  methodology: >
    Initialized git repo with initial commit containing 9 core files (config, components,
    train, main, test suite, CLAUDE.md, planning, lessons, .gitignore). Configured
    .gitignore with 4 patterns (__pycache__/, *.pyc, outputs/, .pytest_cache/) to
    exclude build artifacts, training outputs, and test caches from version control.
  metrics:
    initial_files: 9
    gitignore_patterns: 4
    initial_commit_message: 'Initial commit: vaural vocal communication pipeline'
  figures:
  - results/obj-002-git-repo-initialized-with--gitignore.png
  conclusions: >
    Clean repo structure with appropriate .gitignore coverage. All transient artifacts
    (bytecode, training outputs, pytest cache) are excluded. The 9 initial files establish
    the full two-phase training pipeline, test suite, and project management scaffolding.
  connects_to: obj-003
  completed_date: '2026-03-10'
- id: obj-003
  status: completed
  statement: 'Optimized training loops: replaced DataLoader with direct index slicing, pre-compute fixed transforms in receiver
    pre-training'
  methodology: >
    Replaced torch.utils.data DataLoader/TensorDataset with direct torch.randperm
    index slicing for both training loops. In pretrain_receiver(), pre-computed
    ActionToSignal and Environment transforms once outside the epoch loop (since
    these are fixed random linear transforms with no learnable parameters), eliminating
    redundant forward passes every batch. Removed DataLoader dependency entirely.
  metrics:
    dataloader_removed: true
    dependencies_removed: 2
    receiver_forward_passes_reduced: 'E*B*3 → E*B*1'
    fixed_transform_calls: 'E*B*2 → 1'
  figures:
  - results/obj-003-training-loop-optimization.png
  conclusions: >
    Two key optimizations: (1) pre-computing fixed transforms in receiver pre-training
    reduces forward passes from 3 per batch (ActionToSignal + Environment + Receiver)
    to 1 (Receiver only), saving ~67% of forward-pass compute; (2) replacing DataLoader
    with index slicing removes shuffle/collate overhead and the torch.utils.data
    dependency. Both loops now use minimal pure-PyTorch operations.
  connects_to: obj-004
  completed_date: '2026-03-10'
- id: obj-004
  status: completed
  statement: Added parameter sweep script (sweep.py) with 4 experiment types
  methodology: >
    Created sweep.py with a reusable run_experiment() harness that instantiates
    the full pipeline, trains both phases, and evaluates on normal and uniform test
    distributions. Defined 4 experiments: (1) dimension scaling [8,16,32,64],
    (2) hidden dim scaling [64,128,256] at dim=32, (3) learning rate sweep
    [3e-4,1e-3,3e-3], (4) asymmetric/signal dim scaling. Uses fast defaults
    (500 recv, 800 emit epochs, 3k samples) for rapid iteration. Results saved
    to JSON for downstream analysis.
  metrics:
    experiment_types: 4
    total_configurations: 13
    metrics_per_run: 7
    output_format: JSON
  figures:
  - results/obj-004-parameter-sweep-script.png
  conclusions: >
    The sweep script enables systematic exploration of the hyperparameter space
    with minimal boilerplate. Each run captures receiver loss, emitter loss, test MSE
    on two distributions, parameter counts, and wall-clock time. Fast training defaults
    allow a full 13-configuration sweep in minutes, with findings validated later via
    main.py at full scale.
  connects_to: obj-005
  completed_date: '2026-03-10'
- id: obj-005
  status: completed
  statement: Discovered and documented sound_dim==action_dim constraint
  methodology: >
    During sweep.py Experiment 4 (asymmetric action dims), attempted configurations
    with sound_dim != action_dim (bottleneck 32→16→32, expansion 32→64→32). These
    crashed with shape mismatches, revealing that pretrain_receiver() uses an identity
    mapping (sound = action) which requires both dimensions to match. Root cause:
    sounds are sampled as randn(N, sound_dim) then passed directly to ActionToSignal
    which expects (N, action_dim) inputs. Documented the constraint in planning.md
    and redesigned Experiment 4 to vary signal_dim instead (channel bandwidth).
  metrics:
    configurations_that_crashed: 2
    root_cause: identity_mapping_in_pretrain_receiver
    sweep_experiment_redesigned: 'Exp 4: asymmetric action → signal_dim scaling'
  figures:
  - results/obj-005-sound-dim-action-dim-constraint.png
  conclusions: >
    The identity mapping assumption (sound IS the action during receiver pre-training)
    is a fundamental architectural constraint, not a bug. Supporting asymmetric
    sound_dim/action_dim would require a different pre-training strategy (e.g., a
    learned encoder instead of identity). This discovery led to obj-006 (assertion +
    test) and informed all subsequent experiment designs to keep sound_dim == action_dim.
  connects_to: obj-006
  completed_date: '2026-03-10'
- id: obj-006
  status: completed
  statement: Added assertion + test for the sound_dim==action_dim constraint
  methodology: >
    Added an assertion at the top of pretrain_receiver() in train.py (line 26) that
    raises AssertionError with a descriptive message when sound_dim != action_dim.
    Added a corresponding pytest guard (test_asymmetric_dims_rejected) that creates
    a Config with sound_dim=16, action_dim=8 and verifies the assertion fires before
    any training occurs. This prevents silent shape mismatches or wrong gradients
    from the identity mapping assumption.
  metrics:
    assertion_location: 'train.py:26'
    test_location: 'test_vaural.py:148'
    total_tests_after: 28
    failure_mode_prevented: shape_mismatch_or_silent_wrong_gradients
  figures:
  - results/obj-006-added-assertion---test-for-the-constrain.png
  conclusions: >
    The assertion catches misconfigurations at the earliest possible point (start of
    receiver pre-training) with a clear error message. The pytest guard ensures this
    check is never accidentally removed during refactoring. Together they codify the
    architectural constraint discovered in obj-005 into enforceable code.
  connects_to: obj-007
  completed_date: '2026-03-10'
- id: obj-007
  status: completed
  statement: 'Ran baseline training: dim=16 test MSE = 0.000254'
  methodology: >
    Ran main.py with default Config (sound_dim=action_dim=signal_dim=16, hidden_dim=64,
    seed=42). Phase 1 pre-trained the Receiver for 2000 epochs on 10k samples (identity
    mapping through ActionToSignal+Environment). Phase 2 trained the Emitter for 3000
    epochs on 10k samples with frozen Receiver. Both phases used Adam optimizer at lr=1e-3
    with batch size 64. Evaluated on 100 held-out random sound tokens (randn).
  metrics:
    sound_dim: 16
    action_dim: 16
    signal_dim: 16
    hidden_dim: 64
    receiver_epochs: 2000
    emitter_epochs: 3000
    samples: 10000
    batch_size: 64
    learning_rate: 0.001
    test_mse: 0.000254
    test_tokens: 100
  figures:
  - results/obj-007-baseline-training-dim16.png
  conclusions: >
    The default dim=16 configuration achieves excellent reconstruction (MSE=0.000254)
    with full training (5000 total epochs). This establishes the baseline for all
    subsequent experiments. The result confirms that the two-phase sequential pipeline
    can learn near-perfect reconstruction at dim=16 given sufficient training, contrasting
    with the fast sweep (obj-008) where 800 total epochs produced MSE=0.161.
  connects_to: obj-008
  completed_date: '2026-03-10'
- id: obj-008
  status: completed
  statement: 'Ran fast sweep for dim=8/16/32: dim=8 converges easily, larger dims need more training'
  methodology: >
    Used sweep.py Experiment 1 (dimension scaling) with fast training settings
    (300 receiver + 500 emitter epochs, 2k samples) to test dim=8/16/32 with
    sound_dim=action_dim=signal_dim. Hidden dim scaled as max(64, dim*4): h=64 for
    dim=8/16, h=128 for dim=32. Evaluated on 200 held-out samples from both normal
    and uniform distributions. Compared fast sweep results against the dim=16 full
    training baseline (obj-007, MSE=0.000254) to quantify the training gap.
  metrics:
    dim8_test_mse: 0.000168
    dim8_uniform_mse: 0.000043
    dim16_test_mse: 0.161204
    dim16_uniform_mse: 0.049080
    dim32_test_mse: 0.079817
    dim32_uniform_mse: 0.025893
    dim16_ratio_vs_dim8: 960x
    dim32_ratio_vs_dim8: 475x
    receiver_epochs: 300
    emitter_epochs: 500
    samples: 2000
  figures:
  - results/obj-008-dim-sweep.png
  conclusions: >
    dim=8 achieves near-perfect reconstruction (MSE=0.000168) even with fast/reduced
    training, while dim=16 and dim=32 are ~960x and ~475x worse respectively. Comparing
    dim=16 fast (MSE=0.161) vs full training (MSE=0.000254) shows a 634x gap, confirming
    that larger dimensions need substantially more epochs and samples to converge — not
    just more capacity. dim=32 actually outperforms dim=16 in fast training likely due
    to its larger hidden dim (128 vs 64). This establishes dim=8 as the go-to for rapid
    prototyping and dim>=16 experiments as requiring full training budgets.
  connects_to: obj-009
  completed_date: '2026-03-10'
- id: obj-009
  status: completed
