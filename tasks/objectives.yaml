- id: obj-009
  status: completed
  statement: Literature review of sensorimotor feedback loops and joint audio embedding spaces
  methodology: >
    Used research-scout to survey neuroscience (DIVA, INFERNO), ML (Machine Speech Chain,
    HuBERT, VQ-VAE, AudioLM, CLAP), and emergent communication (Lewis games) literature.
    Evaluated hypothesis against existing work and identified novel angles.
  metrics:
    papers_reviewed: 15
    novel_angles_identified: 3
    existing_precedents: 6
  figures:
  - results/obj-009-research-landscape.png
  conclusions: >
    Hypothesis is well-grounded in neuroscience (DIVA model) and has computational precedents
    (Machine Speech Chain 2017). Vaural's novelty lies in continuous communication through
    unknown random channels and the two-phase training design. Key next experiment: joint
    training ablation to test whether sensorimotor coupling beats sequential learning.
  connects_to: obj-010
  completed_date: '2026-03-10'
