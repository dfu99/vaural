- id: obj-012
  status: completed
  statement: VQ bottleneck capacity curve shows codebook size vs reconstruction tradeoff
  methodology: >
    Implemented VectorQuantizer with EMA codebook updates and straight-through gradients.
    Swept codebook sizes [4, 8, 16, 32, 64, 128, 256] at dim=8 with 300 epochs each.
    Measured test MSE, codebook utilization (active codes), and entropy at each size.
  metrics:
    codebook_4_mse: 1.887
    codebook_16_mse: 1.312
    codebook_64_mse: 0.740
    codebook_256_mse: 0.441
    continuous_mse: 0.002
    all_codebooks_fully_utilized: true
    max_entropy_utilization: 0.97
  figures:
  - results/obj-012-vq-capacity-curve.png
  - results/obj-012-vq-bottleneck-codebook.png
  conclusions: >
    VQ bottleneck works correctly with excellent codebook utilization (near 100% active,
    near-max entropy at all sizes). MSE decreases monotonically with codebook size but
    even 256 codes (MSE=0.44) is far from continuous (MSE=0.002). Reconstructing continuous
    8D random vectors through discrete codes requires exponentially many codes. This validates
    the VQ mechanism but shows the fundamental discretization bottleneck. For meaningful emergent
    phonemes, the input should be structured (not random) to benefit from discrete compression.
  connects_to: obj-013
  completed_date: '2026-03-10'
- id: obj-011
  status: completed
  statement: Joint training beats sequential training, validating sensorimotor coupling hypothesis
  methodology: >
    Implemented joint training mode where Emitter and Receiver train simultaneously from scratch
    (both parameters updated via end-to-end reconstruction loss). Compared against sequential
    baseline (pre-train Receiver, freeze, then train Emitter) at dim=8 and dim=16 with matched
    total epoch budgets (600 epochs, 2k samples).
  metrics:
    dim8_sequential_mse: 0.001909
    dim8_joint_mse: 0.000710
    dim8_improvement: 2.7x
    dim16_sequential_mse: 0.235614
    dim16_joint_mse: 0.234250
    dim16_improvement: 1.01x
  figures:
  - results/obj-011-joint-vs-sequential-dim8.png
  - results/obj-011-joint-vs-sequential-dim16.png
  conclusions: >
    Joint training produces 2.7x better MSE at dim=8, confirming that sensorimotor coupling
    (simultaneous Emitter+Receiver optimization) outperforms sequential training. At dim=16
    both methods are underfitted with 600 epochs and show near-equal performance — the advantage
    of joint training may be more pronounced with sufficient compute. The result supports the
    hypothesis that a shared optimization loop is beneficial.
  connects_to: obj-012
  completed_date: '2026-03-10'
- id: obj-013
  status: completed
  statement: Channel geometry dominates learning; Receiver inverts channel, Emitter stays near-identity
  methodology: >
    Compared orthogonal (κ=1), random Gaussian (κ=62), and ill-conditioned (κ=1000) channel
    transforms at dim=8 with 400 recv + 500 emit epochs. Measured per-direction reconstruction
    error vs singular values. Computed Emitter and Receiver Jacobians to determine which component
    learns the channel inversion. Analyzed Emitter output variance per singular direction.
  metrics:
    orthogonal_mse: 0.000076
    random_mse: 0.001327
    ill_conditioned_mse: 0.035831
    orthogonal_condition_number: 1.0
    random_condition_number: 61.9
    ill_condition_number: 1000.0
    emitter_jacobian_dist_from_identity: 0.497
    emitter_jacobian_dist_from_M_inv: 4.297
    receiver_jacobian_dist_from_M_inv: 0.629
    error_ratio_weak_vs_strong_direction: 18.8
  figures:
  - results/rotational_invariance.png
  conclusions: >
    The system is NOT rotationally invariant. Orthogonal channels are 17x easier than random
    and 471x easier than ill-conditioned. The Receiver does all channel inversion (Jacobian ≈ M⁻¹)
    while the Emitter learns a near-identity mapping. Error concentrates on weak singular directions
    (proportional to 1/σ²). This means the two-phase design creates an asymmetry: the Receiver
    handles the hard problem (inverting the channel) during pre-training, and the Emitter just
    passes through. Architecturally, the Emitter has no incentive to pre-compensate.
  connects_to: obj-015
  completed_date: '2026-03-13'
- id: obj-015
  status: completed
  statement: Pure rotational invariance test separates spectrum from rotation effects
  methodology: >
    Held singular value spectrum fixed at three levels (κ=1, κ=10, κ=100) and varied
    only the rotation matrices U, V (8 random pairs each). Trained full sequential
    pipeline for each of 24 configurations at dim=8 (400 recv + 500 emit epochs, 2k
    samples). Measured MSE distribution across rotations at each fixed spectrum.
  metrics:
    flat_kappa1_mean_mse: 0.000079
    flat_kappa1_cv: 0.133
    flat_kappa1_max_min_ratio: 1.43
    moderate_kappa10_mean_mse: 0.000153
    moderate_kappa10_cv: 0.234
    moderate_kappa10_max_min_ratio: 2.31
    steep_kappa100_mean_mse: 0.000317
    steep_kappa100_cv: 0.202
    steep_kappa100_max_min_ratio: 1.95
    total_configurations: 24
  figures:
  - results/obj-015-pure-rotational-invariance.png
  conclusions: >
    The system is NOT rotationally invariant. Even with identical singular value spectra,
    different rotation matrices U, V cause 13-23% coefficient of variation in MSE and up
    to 2.3x max/min spread. Notably, even at κ=1 (all σ=1, pure rotation channel), MSE
    varies by 1.43x — demonstrating inherent MLP orientation bias from ReLU axis-alignment.
    The dominant factor remains the spectrum (4x MSE change from κ=1 to κ=100), but
    rotation is a meaningful secondary factor. This suggests rotation-equivariant
    architectures could reduce variance and improve worst-case performance.
  connects_to: obj-016
  completed_date: '2026-03-14'
- id: obj-016
  status: completed
  statement: Joint training reduces rotation sensitivity at moderate κ but not at extremes
  methodology: >
    Extended obj-015 by comparing sequential vs joint training across 8 random rotations
    at each of 3 fixed spectra (κ=1, 10, 100). 48 total pipeline trainings at dim=8
    (400 recv + 500 emit = 900 total epochs, 2k samples). Measured both absolute MSE
    and rotation CV for each training mode × spectrum combination.
  metrics:
    kappa1_seq_mse: 0.000079
    kappa1_seq_cv: 0.133
    kappa1_jnt_mse: 0.000354
    kappa1_jnt_cv: 0.205
    kappa10_seq_mse: 0.000153
    kappa10_seq_cv: 0.234
    kappa10_jnt_mse: 0.000284
    kappa10_jnt_cv: 0.105
    kappa100_seq_mse: 0.000317
    kappa100_seq_cv: 0.202
    kappa100_jnt_mse: 0.026828
    kappa100_jnt_cv: 0.520
    total_configurations: 48
  figures:
  - results/obj-016-rotation-sensitivity-joint-vs-seq.png
  conclusions: >
    Joint training's effect on rotational invariance depends on channel difficulty.
    At κ=10, joint training halves rotation CV (23.4% → 10.5%) at the cost of 1.9× worse
    absolute MSE — it genuinely becomes more rotation-invariant. At κ=1, both modes achieve
    low MSE but sequential is better on both MSE and CV. At κ=100, joint training is severely
    underfitted (MSE 85× worse) with high rotation variance (CV 52%). The sweet spot for
    joint training's rotation-invariance benefit is moderate conditioning where the co-adapted
    Emitter+Receiver can distribute inversion work more flexibly than the Receiver-only
    strategy of sequential training, but the channel isn't so hard that 900 epochs is
    insufficient for joint discovery.
  connects_to: obj-017
  completed_date: '2026-03-14'
- id: obj-017
  status: completed
  statement: Activation function causes rotational sensitivity — SiLU best overall
  methodology: >
    Compared 4 activation functions (ReLU, GELU, SiLU, Tanh) across 8 random
    rotations at 3 fixed spectra (κ=1, 10, 100) using sequential training at dim=8
    (400 recv + 500 emit epochs, 2k samples). 96 total pipeline trainings. Measured
    rotation CV and absolute MSE for each activation × spectrum combination.
  metrics:
    relu_mean_cv: 0.190
    gelu_mean_cv: 0.079
    silu_mean_cv: 0.088
    tanh_mean_cv: 0.060
    relu_mean_mse: 0.000183
    gelu_mean_mse: 0.000067
    silu_mean_mse: 0.000033
    tanh_mean_mse: 0.000156
    silu_vs_relu_mse_improvement: 5.5x
    relu_kappa100_mse: 0.000317
    silu_kappa100_mse: 0.000033
    kappa100_improvement: 9.6x
    gelu_kappa10_cv: 0.038
    total_configurations: 96
  figures:
  - results/obj-017-activation-rotational-invariance.png
  conclusions: >
    The ReLU axis-alignment hypothesis is CONFIRMED. All three smooth activations
    show dramatically lower rotation sensitivity than ReLU (6-9% mean CV vs 19%).
    SiLU is the overall winner: best MSE (5.5× better than ReLU) and near-invariant
    (8.8% CV). At κ=100, SiLU achieves 9.6× better MSE than ReLU — the smooth
    activation both improves reconstruction quality AND reduces orientation bias.
    The mechanism is clear: ReLU's element-wise max(0,x) creates boundaries along
    coordinate hyperplanes, creating preferred directions that interact with channel
    rotation. Smooth activations (SiLU, GELU, Tanh) don't have this axis bias.
    Tanh has the lowest CV (6.0%) but worse MSE due to output saturation.
    Recommendation: switch default activation from ReLU to SiLU.
  connects_to: obj-018
  completed_date: '2026-03-16'
- id: obj-018
  status: completed
  statement: SiLU+Sequential is the best combination for rotational invariance
  methodology: >
    Ran 2×2 factorial experiment: (ReLU vs SiLU) × (Sequential vs Joint) across
    8 random rotations at 3 fixed spectra (κ=1, 10, 100). 96 total pipeline
    trainings at dim=8 (400 recv + 500 emit = 900 total epochs, 2k samples).
    Tested whether combining SiLU activation with joint training achieves
    synergistic rotational invariance improvement.
  metrics:
    relu_seq_mean_cv: 0.190
    relu_seq_mean_mse: 0.000183
    relu_joint_mean_cv: 0.277
    relu_joint_mean_mse: 0.009156
    silu_seq_mean_cv: 0.088
    silu_seq_mean_mse: 0.000033
    silu_joint_mean_cv: 0.437
    silu_joint_mean_mse: 0.008300
    silu_joint_kappa100_cv: 0.657
    silu_joint_kappa100_max_min: 342.4
    total_configurations: 96
  figures:
  - results/obj-018-silu-joint-rotation.png
  conclusions: >
    NO SYNERGY between SiLU and joint training. Joint training makes rotation
    sensitivity WORSE regardless of activation (CV 28-44% vs 9-19% for sequential).
    SiLU+Sequential is the clear winner: best MSE (0.000033), best rotation
    invariance (CV 8.8%), and remarkably insensitive to channel condition number
    (MSE barely changes from κ=1 to κ=100). Joint training is underfitted at 900
    epochs — the simultaneous optimization is harder, and the instability shows
    up as high rotation variance. The sequential two-phase approach provides a
    stable optimization path that is inherently more rotationally invariant.
    This completes the rotational invariance investigation arc (obj-013 → obj-018).
  connects_to: obj-019
  completed_date: '2026-03-16'

- id: obj-019
  status: completed
  statement: 'Channel rotation adaptation: Emitter learns pre-rotation when Receiver is frozen'
  methodology: >
    Pre-trained Receiver on channel M₁ (κ=10, dim=8), then tested adaptation to 4
    rotated channels M₂ with same spectrum but different U,V matrices. For each
    rotation: (a) trained fresh Emitter with frozen M₁-Receiver on M₂ channel
    (adaptation), (b) trained fresh Receiver+Emitter on M₂ (oracle baseline).
    Compared ReLU vs SiLU activations. Computed Emitter Jacobians and compared
    to theoretical target transform M₂⁻¹M₁.
  metrics:
    relu_baseline_mse: 0.000159
    relu_adapted_mse_mean: 0.000444
    relu_oracle_mse_mean: 0.000139
    relu_adaptation_ratio: 3.17
    relu_J_target_dist: 0.147
    relu_J_identity_dist: 7.926
    relu_ratio_cv: 0.66
    silu_baseline_mse: 0.000049
    silu_adapted_mse_mean: 0.000138
    silu_oracle_mse_mean: 0.000047
    silu_adaptation_ratio: 2.91
    silu_J_target_dist: 0.082
    silu_J_identity_dist: 7.861
    silu_ratio_cv: 0.10
  figures:
  - results/obj-019-rotation-adaptation.png
  conclusions: >
    The Emitter CAN learn the theoretically predicted pre-rotation M₂⁻¹M₁ when
    forced to compensate for a Receiver-channel mismatch. Jacobian is 50-100×
    closer to target than identity. Adaptation costs ~3× MSE vs oracle (the
    "accent effect"). SiLU enables remarkably consistent adaptation (CV 10%)
    while ReLU is highly variable (CV 66%). This extends the rotation invariance
    arc: the system can dynamically compensate for channel rotations through
    Emitter adaptation, and SiLU's lack of axis-alignment bias makes this
    adaptation reliable across arbitrary rotations.
  connects_to: obj-020
  completed_date: '2026-03-16'

- id: obj-020
  status: completed
  statement: Residual rotation sensitivity is training noise, not structural MLP bias
  methodology: >
    Decomposed SiLU rotation CV into between-rotation vs within-rotation (training seed)
    variance at κ=10. Tested 4 rotations × 3 seeds = 12 runs. Then compared 4
    configurations (SiLU h=64/128/256, SiLU+LayerNorm h=64) across 2 spectra (κ=1, 10)
    × 4 rotations = 32 runs. All at dim=8, 100 recv + 200 emit epochs, 1k samples.
  metrics:
    between_rotation_variance_pct: 20
    within_rotation_seed_variance_pct: 80
    rotation_cv_at_kappa10: 0.017
    mean_seed_cv_at_kappa10: 0.033
    silu_h64_mean_cv: 0.021
    silu_h128_mean_cv: 0.027
    silu_h256_mean_cv: 0.158
    silu_ln_h64_mean_cv: 0.035
    silu_h64_mean_mse: 0.000266
    silu_h128_mean_mse: 0.000096
    silu_h256_mean_mse: 0.000060
    silu_ln_h64_mean_mse: 0.001529
  figures:
  - results/obj-019-residual-rotation-sensitivity.png
  conclusions: >
    The residual rotation CV with SiLU (~2% in this run) is dominated by SGD
    training noise (80% of variance), not structural rotation sensitivity (20%).
    Wider networks (h=128, 256) improve MSE but do NOT improve rotation invariance —
    h=256 actually has worse CV (15.8%) due to overfitting variance. LayerNorm hurts
